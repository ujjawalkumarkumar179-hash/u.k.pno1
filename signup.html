<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up | U.K.P NO1 Education</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="signup-page">

<div class="signup-box">

<div class="signup-logo">
<h1>U.K.P NO1</h1>
<p>Education</p>
</div>

<h2>Create Your Account</h2>

<p class="signup-text">
Join U.K.P NO1 Education and start your learning journey.
</p>

<form id="signupForm">
<!-- Full Name -->
<div class="input-box">
    <i class="fa-solid fa-user"></i>
    <input type="text" id="fullName" placeholder="Full Name" required>
</div>

<!-- Email -->
<div class="input-box">
    <i class="fa-solid fa-envelope"></i>
    <input type="email" id="email" placeholder="Email Address" required>
</div>

<!-- Mobile -->
<div class="input-box">
    <i class="fa-solid fa-phone"></i>
    <input type="tel" id="mobile" placeholder="Mobile Number" required>
</div>


<br><br>

<!-- Confirm Password -->
<div class="input-box">
    <i class="fa-solid fa-lock"></i>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
</div>
<!-- Terms & Conditions -->

<div class="terms">

<label>

<input type="checkbox" id="terms" required>

I agree to the Terms & Conditions

</label>

</div>

<!-- Sign Up Button -->

<button type="submit" id="registerBtn" class="signup-btn" disabled>
    Create Account
</button>

<div class="login-link">

Already have an account?

<a href="login.html">Login</a>

</div>

</form>

</div>

</div>

<script src="script.js"></script>
<script>
const name = document.getElementById("name");
const email = document.getElementById("email");
const password = document.getElementById("password");
const agree = document.getElementById("agree");
const btn = document.getElementById("registerBtn");

function checkForm() {
    if (
        name.value.trim() !== "" &&
        email.value.trim() !== "" &&
        password.value.length >= 6 &&
        agree.checked
    ) {
        btn.disabled = false;
        btn.style.background = "#0A3D91";
        btn.style.color = "white";
        btn.style.cursor = "pointer";
    } else {
        btn.disabled = true;
        btn.style.background = "#ffffff";
        btn.style.color = "#999";
        btn.style.cursor = "not-allowed";
    }
}

name.oninput = checkForm;
email.oninput = checkForm;
password.oninput = checkForm;
agree.onchange = checkForm;
</script>
</body>

</html>
